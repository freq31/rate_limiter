# Lint, type-check, and test the rate limiter against a real Redis.
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: CI

on:
  push:
    branches: ["main", "feature-*"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    # A real Redis for the integration tests. The conftest fixtures connect to
    # it directly when REDIS_HOST is set (otherwise they fall back to
    # testcontainers / skip locally).
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_HOST: localhost
      REDIS_PORT: "6379"

    steps:
      - uses: actions/checkout@v4

      # The project requires Python >= 3.14 (uses 3.14-only syntax), so this
      # is a single supported version, not a matrix.
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Type-check with mypy
        run: mypy src

      - name: Test with pytest
        run: pytest -v
